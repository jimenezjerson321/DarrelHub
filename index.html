<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarrelHub</title>
    <style>
        /* Modern Layout Base with Forced Photo Overrides */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Roboto", "Arial", sans-serif;
        }

        html, body {
            width: 100% !important;
            min-height: 100vh !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        body {
            /* Implemented a cache-busting string (?v=2) to forcefully break stuck browser memory */
            background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.75)), 
                              url('https://i.ibb.co/C3Ym6QfL/Untitled-design-4.jpg?v=2') !important;
            background-size: cover !important;
            background-position: center top !important;
            background-attachment: fixed !important;
            background-repeat: no-repeat !important;
            background-color: #121212 !important; /* Fallback dark mode background instead of gray */
            color: #f1f1f1;
        }

        /* Top Navigation Bar Layout */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background-color: rgba(15, 15, 15, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.5px;
        }

        .nav-links a {
            color: #f1f1f1;
            text-decoration: none;
            margin-left: 24px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Centered Header Text Section */
        .hero-section {
            text-align: center;
            padding: 50px 24px 30px 24px;
            max-width: 1284px;
            margin: 0 auto;
        }

        .hero-content h1 {
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .subtitle {
            font-size: 0.95rem;
            color: #dddddd;
            text-shadow: 0 1px 5px rgba(0,0,0,0.9);
        }

        /* Video Profile Grid Alignment */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 24px;
            max-width: 1284px;
            margin: 16px auto 50px auto;
            padding: 0 24px;
        }

        /* Profile Card Properties */
        .profile-card {
            background: rgba(20, 20, 20, 0.65) !important;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .profile-card:hover {
            transform: translateY(-4px);
            background: rgba(30, 30, 30, 0.85) !important;
            border-color: rgba(255, 255, 255, 0.25);
        }

        .thumbnail-box {
            position: relative;
            width: 100%;
            padding-top: 100%; 
            background-color: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .profile-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-info h3 {
            font-size: 0.95rem;
            font-weight: 500;
            color: #f1f1f1;
            line-height: 1.2rem;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .view-btn {
            display: block;
            background-color: #0099ff;
            color: white;
            padding: 9px 0;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.2s;
        }

        .profile-card:hover .view-btn {
            background-color: #007acc;
        }

        /* POPUP VIDEO OVERLAY */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 800px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content video {
            width: 100%;
            display: block;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }

        .close-btn:hover {
            color: #ff3333;
        }
    </style>
</head>
<body>

    </main>

    <div id="videoModal" class="video-modal" onclick="closeVideo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeVideo()">&times;</span>
            <video id="popupPlayer" controls>
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        function openVideo(videoUrl) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('popupPlayer');
            player.src = videoUrl;
            modal.style.display = 'flex';
            player.play();
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('popupPlayer');
            modal.style.display = 'none';
            player.pause();
            player.src = "";
        }
    </script>

</html>
