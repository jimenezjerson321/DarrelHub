        body {

            background-attachment: fixed;

        }

        .navbar {

            align-items: center;
            padding: 14px 24px;
            background-color: rgba(15, 15, 15, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .logo {

            display: flex;

            text-decoration: none;
            margin-left: 24px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Header Section */
        .hero-section {
            text-align: center;
            padding: 40px 24px 24px 24px;
            max-width: 1284px;
            margin: 0 auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-content h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #ccc;
        }

        /* Video Grid Layout */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
            max-width: 1284px;
            margin: 32px auto;
            padding: 0 24px;
        }

        /* Flat YouTube Style Card Structure */
        .profile-card {
            background: transparent;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .thumbnail-box {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Perfect Square Ratio */
            background-color: #272727;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .profile-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s ease;
        }

        .profile-card:hover .profile-img {
            transform: scale(1.03);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-info h3 {
            font-size: 0.95rem;
            font-weight: 500;
            color: #f1f1f1;
            line-height: 1.2rem;
            text-align: center;
        }

        /* Action Buttons */
        .view-btn {
            display: block;
            background-color: #0099ff;
            color: white;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.2s;
        }

        .profile-card:hover .view-btn {
            background-color: #007acc;
        }

        /* POPUP SYSTEM */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 800px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .modal-content video {
            width: 100%;
            display: block;
        }

        .close-btn {

            top: 15px;
            right: 20px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;

        }

    </style>

    <script>
        function openVideo(videoUrl) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('popupPlayer');
            player.src = videoUrl;
            modal.style.display = 'flex';
            player.play();
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('popupPlayer');
            modal.style.display = 'none';
            player.pause();
            player.src = "";
        }
