<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarrelHub</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
        }

        /* Navbar Styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: rgba(20, 20, 20, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* Hero Section with Background Layout */
        .hero-section {
            position: relative;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url('https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?q=80&w=1920') no-repeat center center/cover;
            text-align: center;
            padding: 40px 20px;
        }

        .hero-content h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        /* Cards Grid Layout */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto 50px auto;
            padding: 0 10px;
        }

        /* Individual Profile Card */
        .profile-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            width: 170px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .profile-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #333;
        }

        .card-info {
            padding: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.4));
            text-align: center;
        }

        .card-info h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Blue "View Profile" Button */
        .view-btn {
            display: block;
            background-color: #0099ff;
            color: white;
            text-decoration: none;
            padding: 8px 0;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .view-btn:hover {
            background-color: #007acc;
        }

        /* Memories Section Header */
        .memories-header h2 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-top: 40px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">🔥 DARRELHUB 🔥</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Memories</a>
        </div>
    </nav>

    <!-- HERO / MAIN SECTION -->
    <header class="hero-section">
        <div class="hero-content">
            <h1>DARRELHUB</h1>
            <p class="subtitle">Seven Brothers • One Bond • One Journey 💔</p>
        </div>

        <!-- PROFILE CARDS CONTAINER -->
        <div class="cards-container">
            
            <!-- Card 1 -->
            <div class="profile-card">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=400" alt="Andro" class="profile-img">
                <div class="card-info">
                    <h3>Andro</h3>
                    <a href="#" class="view-btn">View Profile</a>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="profile-card">
                <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=400" alt="Crislee" class="profile-img">
                <div class="card-info">
                    <h3>Crislee</h3>
                    <a href="#" class="view-btn">View Profile</a>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="profile-card">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400" alt="Darel" class="profile-img">
                <div class="card-info">
                    <h3>Darel</h3>
                    <a href="#" class="view-btn">View Profile</a>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="profile-card">
                <img src="https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?q=80&w=400" alt="Ford" class="profile-img">
                <div class="card-info">
                    <h3>Ford</h3>
                    <a href="#" class="view-btn">View Profile</a>
                </div>
            </div>

            <!-- Card 5 -->
            <div class="profile-card">
                <img src="https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?q=80&w=400" alt="Jerson" class="profile-img">
                <div class="card-info">
                    <h3>Jerson</h3>
                    <a href="#" class="view-btn">View Profile</a>
                </div>
            </div>

            <!-- Card 6 -->
            <div class="profile-card">
                <img src="https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?q=80&w=400" alt="Mike" class="profile-img">
                <div class="card-info">
                    <h3>Mike</h3>
                    <a href="#" class="view-btn">View Profile</a>
                </div>
            </div>

            <!-- Card 7 -->
            <div class="profile-card">
                <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=400" alt="Shanon" class="profile-img">
                <div class="card-info">
                    <h3>Shanon</h3>
                    <a href="#" class="view-btn">View Profile</a>
                </div>
            </div>

        </div>
        
        <!-- MEMORIES SECTION HEADING -->
        <div class="memories-header">
            <h2>📷 OUR MEMORIES</h2>
        </div>
    </header>

</body>
</html>
